<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit Sphere</title>
  <style>
    /* ═══════════════════════════════════════
       BASE
       ═══════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0a0a15;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }
    canvas { display: block; position: absolute; top: 0; left: 0; z-index: 0; }

    .hidden { display: none !important; }

    /* ═══════════════════════════════════════
       LOBBY
       ═══════════════════════════════════════ */
    #lobby {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: radial-gradient(ellipse at center, #0a0a20 0%, #000 70%);
    }

    .lobby-container {
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .lobby-title {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 6px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00ffaa, #00ddff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
    }

    .lobby-subtitle {
      font-size: 0.8rem;
      color: #446;
      letter-spacing: 4px;
      margin-bottom: 40px;
    }

    .lobby-btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      background: linear-gradient(135deg, #112233, #1a1a2e);
      border: 1px solid #00ffaa33;
      color: #00ffaa;
      font-family: inherit;
      font-size: 1rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lobby-btn:hover {
      background: linear-gradient(135deg, #1a2e3a, #222244);
      border-color: #00ffaa88;
      box-shadow: 0 0 20px #00ffaa22;
    }
    .lobby-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .lobby-input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #0a0a20;
      border: 1px solid #334;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 1rem;
      letter-spacing: 2px;
      text-align: center;
    }
    .lobby-input:focus { outline: none; border-color: #00ffaa66; }

    .lobby-input::placeholder { color: #445; }

    #lobby-status {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #668;
      min-height: 1.2em;
    }

    /* Room section */
    .room-code-box {
      margin: 20px 0;
      padding: 16px;
      background: #0a0a20;
      border: 1px solid #00ffaa33;
    }
    .room-code-label { font-size: 0.7rem; color: #446; letter-spacing: 3px; margin-bottom: 4px; }
    #room-code-display { font-size: 2rem; color: #00ffaa; letter-spacing: 8px; }

    /* Player list */
    #player-list { margin: 20px 0; }
    .player-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin: 4px 0;
      background: #111122;
      border-left: 3px solid #334;
    }
    .color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .player-name { flex: 1; text-align: left; }
    .host-badge {
      font-size: 0.65rem;
      color: #ffcc00;
      letter-spacing: 2px;
      padding: 2px 6px;
      border: 1px solid #ffcc0044;
    }
    .ready-badge {
      font-size: 0.65rem;
      color: #00ffaa;
      letter-spacing: 2px;
      padding: 2px 6px;
      border: 1px solid #00ffaa44;
    }

    .ready-active { border-color: #00ffaa88 !important; color: #00ffaa !important; }

    /* ═══════════════════════════════════════
       HUD
       ═══════════════════════════════════════ */
    #hud {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 50;
    }
    #hud > * { pointer-events: auto; }

    /* Voltage display */
    #voltage-display {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.5rem;
      font-weight: bold;
      color: #00ffaa;
      letter-spacing: 4px;
      text-shadow: 0 0 20px #00ffaa44;
    }

    /* Timer */
    #timer-display {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      color: #00ffaa;
      letter-spacing: 2px;
    }
    .timer-urgent { animation: timerPulse 0.5s infinite; }

    @keyframes timerPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Phase indicator */
    #phase-indicator {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: #668;
    }

    /* HUD Player list */
    #hud-player-list {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 220px;
    }
    .hud-player {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      margin: 3px 0;
      background: #0a0a2088;
      backdrop-filter: blur(4px);
      border-left: 2px solid #334;
      font-size: 0.8rem;
    }
    .hud-player.local-player { border-left-color: #00ffaa; }
    .hud-player.busted { opacity: 0.4; text-decoration: line-through; }
    .hud-player.cashed-out { border-left-color: #ffcc00; }

    .hud-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .hud-player-name { flex: 1; }
    .hud-player-voltage { font-size: 0.75rem; min-width: 50px; text-align: right; }
    .hud-player-status { font-size: 0.75rem; min-width: 20px; text-align: center; }

    /* Game controls */
    #game-controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
    }

    #cashout-btn {
      padding: 14px 40px;
      background: linear-gradient(135deg, #002211, #003322);
      border: 2px solid #00ffaa44;
      color: #00ffaa;
      font-family: inherit;
      font-size: 1.1rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #cashout-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #003322, #004433);
      border-color: #00ffaa88;
      box-shadow: 0 0 30px #00ffaa22;
    }
    #cashout-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* Result screen */
    #result-screen {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #0a0a20ee;
      border: 1px solid #00ffaa33;
      padding: 30px 40px;
      min-width: 350px;
      backdrop-filter: blur(8px);
      z-index: 60;
    }
    #result-screen h2 {
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: 5px;
      color: #00ffaa;
      margin-bottom: 20px;
    }
    .result-list { display: flex; flex-direction: column; gap: 8px; }
    .result-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #111122;
      font-size: 0.85rem;
    }
    .result-entry.busted { opacity: 0.5; }
    .result-rank { color: #ffcc00; min-width: 30px; }
    .result-color { width: 8px; height: 8px; border-radius: 50%; }
    .result-name { flex: 1; }
    .result-voltage { color: #00ffaa; min-width: 60px; text-align: right; }
    .result-status { min-width: 80px; text-align: center; font-size: 0.7rem; color: #668; }
    .result-payout { color: #ffcc00; min-width: 60px; text-align: right; font-weight: bold; }

    /* ═══════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════ */
    @media (max-width: 480px) {
      .lobby-title { font-size: 1.8rem; }
      #voltage-display { font-size: 1.8rem; }
      #hud-player-list { width: 160px; }
      #result-screen { min-width: 90vw; padding: 20px; }
    }
  </style>
</head>
<body>
  <!-- Three.js Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- ═══════ LOBBY ═══════ -->
  <div id="lobby">
    <div class="lobby-container">
      <div class="lobby-title">CIRCUIT SPHERE</div>
      <div class="lobby-subtitle">NAVIGATE THE GRID // CHASE THE VOLTAGE</div>

      <!-- Main menu -->
      <div id="lobby-menu">
        <input id="name-input" class="lobby-input" type="text" placeholder="ENTER YOUR NAME" maxlength="16">
        <button id="create-btn" class="lobby-btn">CREATE ROOM</button>
        <button id="join-show-btn" class="lobby-btn">JOIN ROOM</button>
      </div>

      <!-- Join section -->
      <div id="join-section" class="hidden">
        <input id="join-input" class="lobby-input" type="text" placeholder="ROOM CODE" maxlength="5">
        <button id="join-btn" class="lobby-btn">CONNECT</button>
        <button id="back-btn" class="lobby-btn" style="border-color:#44336633;color:#998;">BACK</button>
      </div>

      <!-- Room section -->
      <div id="room-section" class="hidden">
        <div class="room-code-box">
          <div class="room-code-label">ROOM CODE</div>
          <div id="room-code-display">-----</div>
        </div>
        <div id="player-list"></div>
        <button id="ready-btn" class="lobby-btn">READY</button>
        <button id="start-btn" class="lobby-btn hidden" style="border-color:#ffcc0044;color:#ffcc00;">START GAME</button>
      </div>

      <div id="lobby-status"></div>
    </div>
  </div>

  <!-- ═══════ HUD ═══════ -->
  <div id="hud" class="hidden">
    <div id="voltage-display">1.00x</div>
    <div id="timer-display">15s</div>
    <div id="phase-indicator">SAFE ZONE</div>
    <div id="hud-player-list"></div>
  </div>

  <!-- ═══════ GAME CONTROLS ═══════ -->
  <div id="game-controls" class="hidden">
    <button id="cashout-btn">CASH OUT</button>
  </div>

  <!-- ═══════ RESULT SCREEN ═══════ -->
  <div id="result-screen" class="hidden"></div>

  <!-- ═══════ SCRIPTS ═══════ -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    // Load Three.js and addons into global scope for board.js and scene.js
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    window.THREE = THREE;
    window.THREE_ADDONS = { OrbitControls };

    // Boot game
    const { init } = await import('./js/main.js');
    init();
  </script>
</body>
</html>
