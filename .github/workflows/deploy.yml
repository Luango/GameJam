name: Deploy Circuit Sphere to GitHub Pages

on:
  push:
    branches:
      - master           # Deploy from master
      - integration      # P2 Vite build deploys from integration branch
      - p2p-multiplayer  # P1 vanilla build deploys from p2p-multiplayer branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Master deploy (Vite build) ────────────────────────────────────────────
  build-master:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-master:
    if: github.ref == 'refs/heads/master'
    needs: build-master
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  # ── P2 Vite build (feat/board-ui → integration) ──────────────────────────
  build-p2:
    if: github.ref == 'refs/heads/integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-p2:
    if: github.ref == 'refs/heads/integration'
    needs: build-p2
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  # ── P1 vanilla build (p2p-multiplayer) ───────────────────────────────────
  deploy-p1:
    if: github.ref == 'refs/heads/p2p-multiplayer'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout p2p-multiplayer branch
        uses: actions/checkout@v4
        with:
          ref: p2p-multiplayer

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
